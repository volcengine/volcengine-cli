<head>

  <title>火山引擎认证成功</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 37 34"><path d="M30.4698 17.3742L25.525 33.3082C25.4533 33.6199 25.7041 33.9663 26.0624 33.9663H35.9521C36.3104 33.9663 36.5612 33.6546 36.4896 33.3082L31.5089 17.3742C31.4014 16.8546 30.5773 16.8546 30.4698 17.3742Z" fill="%2337E2E2"/><path d="M3.09383 25.2724L0.0122567 33.3433C-0.0594079 33.655 0.191418 33.9668 0.549742 33.9668H6.67705C7.03537 33.9668 7.2862 33.655 7.21454 33.3433L4.13296 25.2724C4.02546 24.7181 3.23716 24.7181 3.09383 25.2724Z" fill="%2337E2E2"/><path d="M9.82917 9.51066L3.02105 33.3077C2.94938 33.6194 3.20021 33.9658 3.55853 33.9658H17.1748C17.5331 33.9658 17.7839 33.6541 17.7123 33.3077L10.9041 9.51066C10.7608 8.99108 9.9725 8.99108 9.82917 9.51066Z" fill="%231678FF"/><path d="M21.2986 0.415669L11.6597 33.308C11.5881 33.6197 11.8389 33.9661 12.1972 33.9661H31.4391C31.7975 33.9661 32.0483 33.6544 31.9766 33.308L22.3377 0.415669C22.1944 -0.138556 21.4061 -0.138556 21.2986 0.415669Z" fill="%231678FF"/><path d="M14.92 13.459L9.04351 33.3419C8.97184 33.6536 9.22267 34 9.58099 34H21.334C21.6923 34 21.9431 33.6882 21.8715 33.3419L15.9591 13.459C15.8516 12.9048 15.0275 12.9048 14.92 13.459Z" fill="%2337E2E2"/></svg>'>
  <style>
    :root {
      --bg-start: #f8f9ff;
      --bg-mid: #f1f7ff;
      --bg-end: #eef4ff;
      --brand-blue: #1678ff;
      --text-strong: #17191f;
      --text-muted: #7d8798;
      --card-border: rgba(40, 57, 92, 0.08);
      --card-shadow: 0 24px 54px rgba(57, 79, 119, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      font-family:
        "Volcengine Sans",
        "Segoe UI",
        "Helvetica Neue",
        Arial,
        sans-serif;
      background: var(--bg-start);
      color: var(--text-strong);
    }

    .auth-page {
      position: relative;
      width: 100vw;
      min-width: 320px;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 52% 44%, rgba(255, 255, 255, 0.58), transparent 32%),
        linear-gradient(112deg, var(--bg-start) 0%, var(--bg-mid) 58%, var(--bg-end) 100%);
      isolation: isolate;
    }

    .auth-page::before {
      position: absolute;
      inset: 0;
      z-index: -4;
      content: "";
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.28), transparent 28%),
        radial-gradient(circle at 82% 4%, rgba(226, 228, 255, 0.56), transparent 31%);
      pointer-events: none;
    }

    .background-3d {
      position: absolute;
      inset: 0;
      z-index: -3;
      display: none;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .prototype-bottom-art {
      position: absolute;
      bottom: 0;
      left: 0;
      z-index: -3;
      display: block;
      width: 100%;
      height: 31.111vh;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.18) 12%, #000 26%);
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.18) 12%, #000 26%);
    }

    .brand {
      position: absolute;
      top: 32px;
      left: 40px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 0;
      width: 180px;
      height: 34px;
      color: #3b3d43;
      text-decoration: none;
    }

    .brand-image {
      display: block;
      height: 34px;
      object-fit: contain;
    }

    .brand-image.zh {
      width: 152px;
    }

    .brand-image.en {
      display: none;
      width: 180px;
    }

    html[lang="en"] .brand-image.zh {
      display: none;
    }

    html[lang="en"] .brand-image.en {
      display: block;
    }

    .status-card {
      position: absolute;
      top: 31.1vh;
      left: 50%;
      z-index: 2;
      display: flex;
      width: 333px;
      min-height: 239px;
      padding: 31.5px 30px 29.5px;
      transform: translateX(-50%);
      flex-direction: column;
      align-items: center;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(18px);
    }

    .status-illustration {
      position: relative;
      width: 80px;
      height: 92px;
      margin: 0 0 8px;
      flex: 0 0 auto;
    }

    .status-illustration svg,
    .status-illustration img {
      position: absolute;
      top: 6px;
      left: 0;
      display: block;
      width: 80px;
      height: 80px;
      overflow: visible;
    }

    .status-illustration .failure-art {
      display: none;
    }

    .status-title {
      width: 100%;
      max-width: 273px;
      min-height: 24px;
      max-height: 48px;
      margin: 0 0 8px;
      overflow: hidden;
      font-size: 18px;
      font-weight: 600;
      line-height: 24px;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .status-copy {
      width: 273px;
      margin: 0;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 400;
      line-height: 22px;
      text-align: center;
      white-space: pre-line;
    }

    .error-detail {
      width: 273px;
      margin: 8px 0 0;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 400;
      line-height: 20px;
      text-align: center;
      overflow-wrap: anywhere;
      white-space: pre-line;
    }

    .error-detail[hidden] {
      display: none;
    }

    .soft-mark {
      position: absolute;
      z-index: -2;
      width: 10px;
      height: 23px;
      border-radius: 1px;
      background: rgba(232, 235, 255, 0.72);
      pointer-events: none;
    }

    .soft-mark.one {
      top: 197px;
      left: 340px;
    }

    .soft-mark.two {
      top: 220px;
      left: 161px;
      opacity: 0.56;
    }

    .lower-haze {
      position: absolute;
      right: -2%;
      bottom: -72px;
      z-index: -3;
      width: 66%;
      height: 178px;
      border-radius: 100% 0 0 0 / 64% 0 0 0;
      background:
        linear-gradient(174deg, rgba(255, 255, 255, 0) 0%, rgba(230, 240, 255, 0.24) 48%, rgba(249, 252, 255, 0.9) 100%);
      box-shadow: inset 0 1px 0 rgba(128, 172, 255, 0.08);
      pointer-events: none;
    }

    .bottom-left-shape {
      position: absolute;
      bottom: -236px;
      left: -248px;
      z-index: -2;
      width: 622px;
      height: 384px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 45% 76%, rgba(255, 255, 255, 0.98) 0 18%, transparent 30%),
        radial-gradient(circle at 72% 34%, rgba(84, 178, 255, 0.16), transparent 49%),
        linear-gradient(148deg, rgba(87, 222, 237, 0.34), rgba(212, 236, 255, 0.22) 57%, rgba(249, 252, 255, 0.08));
      box-shadow:
        inset 0 22px 40px rgba(255, 255, 255, 0.88),
        0 -4px 22px rgba(72, 202, 226, 0.12);
      transform: rotate(8deg);
      pointer-events: none;
    }

    .bottom-left-shape::before {
      position: absolute;
      top: 38px;
      left: 58px;
      width: 78%;
      height: 34%;
      content: "";
      border-top: 8px solid rgba(82, 196, 231, 0.2);
      border-radius: 52% 48% 0 0 / 100% 100% 0 0;
      filter: blur(2px);
      transform: rotate(9deg);
    }

    .bottom-left-shape::after {
      position: absolute;
      right: 44px;
      bottom: 54px;
      width: 63%;
      height: 24%;
      content: "";
      border-top: 16px solid rgba(255, 255, 255, 0.46);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      filter: blur(7px);
    }

    .bottom-right-shape {
      position: absolute;
      right: -126px;
      bottom: -342px;
      z-index: -2;
      width: 792px;
      height: 472px;
      border-radius: 55% 45% 0 0 / 100% 92% 0 0;
      background:
        radial-gradient(circle at 31% 20%, rgba(255, 255, 255, 0.9) 0 7%, transparent 15%),
        radial-gradient(circle at 26% 47%, rgba(229, 119, 255, 0.5), transparent 35%),
        radial-gradient(circle at 72% 30%, rgba(42, 145, 255, 0.66), transparent 47%),
        linear-gradient(124deg, rgba(236, 226, 255, 0.56), rgba(123, 98, 255, 0.7) 50%, rgba(43, 190, 226, 0.7));
      box-shadow:
        inset 18px 28px 36px rgba(255, 255, 255, 0.62),
        inset -34px -16px 58px rgba(13, 113, 235, 0.13),
        0 -16px 40px rgba(81, 134, 255, 0.12);
      opacity: 0.84;
      filter: saturate(0.86);
      transform: rotate(-7deg);
      pointer-events: none;
    }

    .bottom-right-shape::before {
      position: absolute;
      top: 18px;
      left: 32px;
      width: 80%;
      height: 40%;
      content: "";
      border-top: 5px solid rgba(255, 255, 255, 0.48);
      border-radius: 52% 48% 0 0 / 100% 100% 0 0;
      filter: blur(1.5px);
    }

    .bottom-right-shape::after {
      position: absolute;
      right: 62px;
      bottom: 30px;
      width: 31%;
      height: 52%;
      content: "";
      background: linear-gradient(142deg, rgba(70, 118, 255, 0.18), rgba(18, 150, 232, 0.26));
      clip-path: polygon(32% 0, 100% 48%, 70% 100%, 0 48%);
      filter: blur(0.5px);
      opacity: 0.34;
    }

    .lower-haze,
    .bottom-left-shape,
    .bottom-right-shape {
      display: none;
    }

    html[data-state="error"] .success-art {
      display: none;
    }

    html[data-state="error"] .failure-art {
      display: block;
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      .auth-page {
        min-height: 620px;
      }

      .brand {
        top: 24px;
        left: 24px;
      }

      .status-card {
        top: 176px;
        width: calc(100vw - 48px);
        max-width: 333px;
      }

      .bottom-right-shape {
        right: -266px;
        bottom: -328px;
        transform: rotate(-7deg) scale(0.74);
      }

      .bottom-left-shape {
        bottom: -248px;
        left: -302px;
        transform: rotate(8deg) scale(0.74);
      }

      .soft-mark.one,
      .soft-mark.two {
        display: none;
      }
    }
  </style>
</head>

  <script>
    (() => {
      const pageData = __CALLBACK_PAGE_DATA__;
      const messages = pageData.messages || {};
      const callbackError = typeof pageData.errorMessage === "string"
        ? pageData.errorMessage
        : "";
      const errorText = callbackError.trim();
      const hasError = errorText !== "";
      const textOr = (value, fallback) =>
        typeof value === "string" && value !== "" ? value : fallback;

      const successTitle = textOr(messages.successTitle, "认证成功");
      const failureTitle = textOr(messages.failureTitle, "认证失败");
      const successCopy = textOr(
        messages.successCopy,
        "你可以关闭此页面并返回\n终端继续操作。",
      );
      const failureCopy = textOr(messages.failureCopy, "请返回终端继续操作。");
      const oauthErrorLabel = textOr(messages.oauthErrorLabel, "OAuth 错误");

      // 后端已统一处理 error/Error/error_description 的优先级；浏览器端只根据注入数据切换状态。
      // 所有动态文本都通过 textContent 写入，避免 OAuth 错误内容被浏览器当作 HTML 执行。
      document.documentElement.lang = textOr(pageData.lang, "zh");
      document.documentElement.dataset.state = hasError ? "error" : "success";
      document.title = hasError
        ? textOr(messages.documentTitleFailure, "火山引擎认证失败")
        : textOr(messages.documentTitleSuccess, "火山引擎认证成功");

      const statusTitle = document.getElementById("statusTitle");
      const statusCopy = document.getElementById("statusCopy");
      const errorDetail = document.getElementById("errorDetail");
      const title = hasError ? failureTitle : successTitle;

      statusTitle.textContent = title;
      statusTitle.title = title;
      statusCopy.textContent = hasError ? failureCopy : successCopy;
      errorDetail.hidden = !hasError;
      errorDetail.textContent = hasError ? `${oauthErrorLabel}: ${errorText}` : "";
    })();
  </script>
